services:
  # Web Service
  - type: web
    name: harmonica-tabs
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT "app:create_app()"
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.9.16
    
  # PostgreSQL Database
  - type: pserv
    name: harmonica-tabs-db
    runtime: postgresql
    plan: free
    envVars:
      - key: POSTGRES_USER
        value: harmonica_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_DB
        value: harmonica_tabs
